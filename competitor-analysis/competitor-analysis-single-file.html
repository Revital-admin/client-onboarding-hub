  <title>Competitor Analysis Template</title>
  <style>
/* ============================================================
   Competitor Analysis Template — styles.css
   ============================================================ */

/* ── Reset & base ── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --color-bg:            #ffffff;
  --color-surface:       #f5f5f3;
  --color-border:        #e2e2de;
  --color-border-mid:    #d0d0ca;
  --color-text:          #1a1a18;
  --color-text-muted:    #6b6b67;
  --color-text-hint:     #9e9e99;

  --purple-50:  #EEEDFE;
  --purple-200: #AFA9EC;
  --purple-600: #534AB7;
  --purple-800: #3C3489;

  --teal-600:   #1D9E75;
  --coral-600:  #D85A30;

  --green-50:   #E8F5F0;
  --green-600:  #0F6E56;
  --green-800:  #085041;

  --red-50:     #FDF0EB;
  --red-600:    #993C1D;

  --blue-50:    #EAF2FB;
  --blue-600:   #185FA5;

  --pink-50:    #FDF0F5;
  --pink-600:   #993556;

  --amber-600:  #BA7517;

  --font-sans:  'DM Sans', system-ui, sans-serif;
  --font-mono:  'DM Mono', monospace;

  --radius-sm:  6px;
  --radius-md:  10px;
  --radius-lg:  14px;

  --shadow-sm:  0 1px 3px rgba(0,0,0,.06);
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
}

body {
  font-family: var(--font-sans);
  background: #f0efe9;
  color: var(--color-text);
  min-height: 100vh;
  padding: 2rem 1rem;
}

/* ── Page container ── */
.page {
  max-width: 860px;
  margin: 0 auto;
  background: var(--color-bg);
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-border);
  box-shadow: var(--shadow-sm);
  padding: 2rem 2.25rem 2.5rem;
}

/* ── Header ── */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1.25rem;
  margin-bottom: 1.75rem;
  padding-bottom: 1.25rem;
  border-bottom: 1px solid var(--color-border);
  flex-wrap: wrap;
}

.brand-logo {
  height: 52px;
  width: auto;
  object-fit: contain;
  background: transparent;
  border-radius: 0;
  padding: 0;
}

.header-right {
  text-align: right;
}

.page-header h1 {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -.3px;
  color: var(--color-text);
}

.page-header .subtitle {
  font-size: 13px;
  color: var(--color-text-muted);
  margin-top: 3px;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 500;
  padding: 5px 11px;
  border-radius: 999px;
  background: var(--purple-50);
  color: var(--purple-800);
  border: 1px solid var(--purple-200);
  white-space: nowrap;
}

/* ── Section label ── */
.section-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .09em;
  color: var(--color-text-hint);
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  margin-top: 1.75rem;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--color-border);
}

/* ── Meta row ── */
.meta-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: .25rem;
}

.meta-card {
  background: var(--color-surface);
  border-radius: var(--radius-md);
  padding: 10px 13px;
  border: 1px solid var(--color-border);
}

.meta-card label {
  display: block;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--color-text-hint);
  margin-bottom: 4px;
}

.meta-card input {
  width: 100%;
  border: none;
  background: transparent;
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--color-text);
  outline: none;
}

.meta-card input::placeholder {
  color: var(--color-text-hint);
  font-weight: 400;
}

/* ── Competitor table ── */
.table-wrap {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.comp-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

/* Header row */
.comp-table thead tr {
  background: var(--color-surface);
}

.comp-table th {
  padding: 10px 12px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--color-text-muted);
  border-right: 1px solid var(--color-border);
  border-bottom: 1px solid var(--color-border);
  text-align: center;
  vertical-align: middle;
}

.comp-table th:first-child {
  width: 22%;
  text-align: center;
}

.comp-table th:last-child {
  border-right: none;
}

.tier-head {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  margin-bottom: 5px;
}

.dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Competitor name input inside header */
.comp-name {
  display: block;
  width: 100%;
  border: none;
  background: transparent;
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 500;
  color: var(--color-text);
  text-align: center;
  outline: none;
  border-top: 1px solid var(--color-border);
  padding-top: 5px;
  margin-top: 4px;
}

.comp-name::placeholder {
  color: var(--color-text-hint);
  font-weight: 400;
}

/* Body cells */
.comp-table td {
  border-right: 1px solid var(--color-border);
  border-bottom: 1px solid var(--color-border);
  vertical-align: middle;
  padding: 0;
}

.comp-table td:last-child {
  border-right: none;
}

.comp-table tbody tr:last-child td {
  border-bottom: none;
}

/* Alternating row backgrounds */
.comp-table tbody tr:nth-child(even) td {
  background: #fafaf8;
}

/* Row label cell */
.row-label {
  padding: 10px 13px;
  font-size: 12px;
  font-weight: 500;
  color: var(--color-text-muted);
  background: var(--color-surface) !important;
  text-align: center;
}

/* Textarea inside table cell */
.cell-input {
  display: block;
  width: 100%;
  border: none;
  background: transparent;
  font-family: var(--font-sans);
  font-size: 12px;
  color: var(--color-text);
  resize: none;
  outline: none;
  padding: 9px 11px;
  line-height: 1.5;
}

.cell-input::placeholder {
  color: var(--color-text-hint);
}

/* Star rating */
.stars {
  display: flex;
  justify-content: center;
  gap: 3px;
  padding: 8px 8px 4px;
}

.star {
  font-size: 16px;
  cursor: pointer;
  color: var(--color-border-mid);
  user-select: none;
  transition: color .15s;
}

.star:hover,
.star.on {
  color: var(--amber-600);
}

.score-bar {
  height: 3px;
  background: var(--color-border);
  margin: 0 11px 9px;
  border-radius: 2px;
  overflow: hidden;
}

.score-fill {
  height: 100%;
  border-radius: 2px;
  transition: width .35s ease;
}

/* ── SWOT grid ── */
.swot-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.swot-card {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 14px;
}

.swot-card h3 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 5px;
}

/* SWOT heading colors */
.swot-card h3.s { color: var(--green-600); }
.swot-card h3.w { color: var(--red-600); }
.swot-card h3.o { color: var(--blue-600); }
.swot-card h3.t { color: var(--pink-600); }

/* Quick-add toggle button */
.prompt-toggle {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-sans);
  font-size: 11px;
  color: var(--color-text-hint);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  margin-bottom: 7px;
  transition: color .15s;
}

.prompt-toggle:hover {
  color: var(--color-text-muted);
}

.prompt-toggle svg {
  transition: transform .2s;
}

.prompt-toggle.open svg.chevron {
  transform: rotate(180deg);
}

/* Quick-add prompts panel */
.prompt-panel {
  display: none;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 8px 10px;
  margin-bottom: 9px;
}

.prompt-panel.open {
  display: block;
}

.prompt-item {
  display: flex;
  align-items: flex-start;
  gap: 7px;
  padding: 4px 0;
}

.prompt-item input[type="checkbox"] {
  margin-top: 2px;
  flex-shrink: 0;
  accent-color: var(--purple-600);
  cursor: pointer;
}

.prompt-item label {
  font-size: 11px;
  color: var(--color-text-muted);
  cursor: pointer;
  line-height: 1.5;
  transition: color .15s;
}

.prompt-item.checked label {
  color: var(--color-text);
}

/* SWOT textarea */
.swot-ta {
  width: 100%;
  border: none;
  background: transparent;
  font-family: var(--font-sans);
  font-size: 12px;
  color: var(--color-text);
  resize: none;
  outline: none;
  line-height: 1.6;
  margin-top: 4px;
}

.swot-ta::placeholder {
  color: var(--color-text-hint);
}

/* ── Insight box ── */
.insight-box {
  background: var(--purple-50);
  border: 1px solid var(--purple-200);
  border-radius: var(--radius-lg);
  padding: 13px 16px;
  font-size: 13px;
  color: var(--purple-800);
  line-height: 1.6;
}

.insight-box strong {
  font-weight: 600;
  margin-right: 5px;
}

.insight-text {
  outline: none;
}

/* ── Action buttons ── */
.action-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 1.75rem;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 500;
  padding: 8px 15px;
  border-radius: var(--radius-md);
  border: 1px solid var(--color-border-mid);
  background: transparent;
  color: var(--color-text);
  cursor: pointer;
  transition: background .15s, border-color .15s;
}

.btn:hover {
  background: var(--color-surface);
  border-color: var(--color-border-mid);
}

.btn-primary {
  background: var(--purple-600);
  color: var(--purple-50);
  border-color: var(--purple-600);
}

.btn-primary:hover {
  background: var(--purple-800);
  border-color: var(--purple-800);
}

/* ── Print / Save as PDF styles ── */
@media print {
  @page {
    size: A4 portrait;
    margin: 15mm 12mm;
  }

  body {
    background: white;
    padding: 0;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .page {
    box-shadow: none;
    border: none;
    border-radius: 0;
    padding: 0;
    max-width: 100%;
  }

  .action-row,
  .prompt-toggle,
  .prompt-panel {
    display: none !important;
  }

  .swot-ta,
  .cell-input {
    color: #000;
  }

  .comp-table,
  .swot-card,
  .insight-box,
  .meta-card {
    break-inside: avoid;
  }

  .brand-logo {
    height: 44px;
  }
}

/* ── Responsive ── */
@media (max-width: 620px) {
  .meta-row {
    grid-template-columns: 1fr 1fr;
  }

  .swot-grid {
    grid-template-columns: 1fr;
  }

  .page {
    padding: 1.25rem 1rem;
  }
}

            <th>
              <div class="tier-head">
                <span class="dot" style="background:#1D9E75"></span>
                Mid Competitor
              </div>
              <input class="comp-name" type="text" placeholder="Name" />
            </th>
            <th>
              <div class="tier-head">
                <span class="dot" style="background:#D85A30"></span>

              </div>
              <input class="comp-name" type="text" placeholder="Name" />

    <!-- ── SWOT ── -->
    <div class="section-label">SWOT — Gaps &amp; Opportunities</div>

    <div class="swot-grid" id="swotGrid"></div>

    <!-- ── Key Takeaway ── -->
    <div class="section-label">Key Takeaway</div>

    <div class="insight-box">
      <strong>Strategic Insight:</strong>
      <span class="insight-text" contenteditable="true" role="textbox" aria-multiline="true" aria-label="Strategic insight">Write your main conclusion — where to position your company, who to target, and what to do next.</span>
    </div>

    <!-- ── Action buttons ── -->
    <div class="action-row">
      <button class="btn btn-primary" onclick="downloadPDF()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download PDF
      </button>
      <button class="btn" onclick="clearAll()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
        Reset
      </button>
    </div>

  </div><!-- /page -->

  
  

<script>
/* ============================================================
   data.js — all editable content lives here
   Edit this file to customize rows, prompts, and SWOT cards.
   ============================================================ */

const TABLE_ROWS = [
  { label: 'Followers',              placeholder: 'e.g. 120K IG, 45K TT' },
  { label: 'Posting Frequency',      placeholder: 'e.g. Daily reels, 3x/week' },
  { label: 'Content Style',          placeholder: 'Cinematic, UGC, editorial…' },
  { label: 'Engagement Rate',        placeholder: 'e.g. ~3.2% avg' },
  { label: 'Avg Video Views',        placeholder: 'e.g. 50K per reel' },
  { label: 'Best Performing Content',placeholder: 'BTS, client results, trends…' },
  { label: 'Pricing Model',          placeholder: 'Retainer / project / hourly' },
  { label: 'Brand Identity',         placeholder: 'Tone, aesthetic, positioning…' },
  { label: 'Target Clients',         placeholder: 'SMBs, lifestyle brands…' },
];

const COMPETITOR_COLORS = {
  a: '#534AB7',
  b: '#1D9E75',
  c: '#D85A30',
};

const SWOT_DATA = [
  {
    key: 's',
    label: 'Strengths',
    sub: 'You vs. them',
    headClass: 's',
    borderColor: '#9FE1CB',
    placeholder: 'What do you do better? Full-service team, faster turnaround, stronger storytelling…',
    prompts: [
      'We turn projects around faster than competitors because ___',
      'Our content quality stands out because ___',
      'We offer something competitors don\'t: ___',
      'Clients choose us over others because ___',
      'Our team\'s unique skill or background is ___',
      'We have stronger relationships in ___ industry/niche',
      'Our pricing is more competitive because ___',
      'We\'re better at storytelling / brand voice because ___',
    ],
  },
  {
    key: 'w',
    label: 'Weaknesses',
    sub: 'To address',
    headClass: 'w',
    borderColor: '#F0997B',
    placeholder: 'Where do competitors outperform you? Brand recognition, niche expertise…',
    prompts: [
      'We lack brand recognition in ___ market',
      'Competitors have a larger following on ___',
      'We don\'t yet offer ___ as a service',
      'Our content on ___ platform is underdeveloped',
      'We lose clients to competitors on price because ___',
      'Our team is missing expertise in ___',
      'We don\'t have enough case studies or social proof in ___',
      'Our onboarding / client process needs work in ___',
    ],
  },
  {
    key: 'o',
    label: 'Opportunities',
    sub: 'Market gaps',
    headClass: 'o',
    borderColor: '#85B7EB',
    placeholder: 'Underserved niches, emerging platforms, verticals they ignore…',
    prompts: [
      'No competitor is strongly serving ___ type of client',
      '___ platform is growing but competitors aren\'t on it yet',
      'There\'s demand for ___ style of content nobody does well',
      'We could white-label or partner with ___',
      '___ industry is underserved for content production',
      'Brands are moving from ___ toward ___ — we can lead that',
      'There\'s a gap in ___ price range we could own',
      'A trend we can capitalize on before competitors: ___',
    ],
  },
  {
    key: 't',
    label: 'Threats',
    sub: 'To watch',
    headClass: 't',
    borderColor: '#ED93B1',
    placeholder: 'Competitor pivots, pricing pressure, AI tools, algorithm shifts…',
    prompts: [
      '___ competitor is growing fast targeting our same clients',
      'AI tools like ___ could undercut our pricing or workflow',
      '___ platform\'s algorithm change could hurt content reach',
      'Clients are cutting budgets in ___ area',
      'A new competitor just entered the market offering ___',
      'Trends are shifting away from ___ content we specialize in',

      'Clients are starting to bring ___ in-house instead',

</script>

<script>
/* ============================================================
   app.js — builds the UI and handles all interactions
   ============================================================ */

/* ── Set today's date ── */
document.getElementById('date').value = new Date().toLocaleDateString('en-US', {
  month: 'long', day: 'numeric', year: 'numeric',
});

/* ── Build competitor table body ── */
(function buildTable() {
  const tbody = document.getElementById('compTableBody');

  TABLE_ROWS.forEach(function(row) {
    const tr = document.createElement('tr');

    const labelTd = document.createElement('td');
    labelTd.className = 'row-label';
    labelTd.textContent = row.label;
    tr.appendChild(labelTd);

    ['a', 'b', 'c'].forEach(function() {
      const td = document.createElement('td');
      const ta = document.createElement('textarea');
      ta.className = 'cell-input';
      ta.rows = 2;
      ta.placeholder = row.placeholder;
      td.appendChild(ta);
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  /* Overall score row */
  const scoreRow = document.createElement('tr');

  const scoreLabelTd = document.createElement('td');
  scoreLabelTd.className = 'row-label';
  scoreLabelTd.textContent = 'Overall Score';
  scoreRow.appendChild(scoreLabelTd);

  ['a', 'b', 'c'].forEach(function(comp) {
    const td = document.createElement('td');

    const starsDiv = document.createElement('div');
    starsDiv.className = 'stars';
    starsDiv.dataset.comp = comp;

    for (let i = 1; i <= 5; i++) {
      const star = document.createElement('span');
      star.className = 'star';
      star.textContent = '★';
      star.dataset.val = i;
      star.addEventListener('click', function() {
        const allStars = starsDiv.querySelectorAll('.star');
        allStars.forEach(function(s) {
          s.classList.toggle('on', parseInt(s.dataset.val) <= i);
        });
        fill.style.width = (i / 5 * 100) + '%';
      });
      starsDiv.appendChild(star);
    }

    const barDiv = document.createElement('div');
    barDiv.className = 'score-bar';
    const fill = document.createElement('div');
    fill.className = 'score-fill';
    fill.id = 'fill-' + comp;
    fill.style.width = '0%';
    fill.style.background = COMPETITOR_COLORS[comp];
    barDiv.appendChild(fill);

    td.appendChild(starsDiv);
    td.appendChild(barDiv);
    scoreRow.appendChild(td);
  });

  tbody.appendChild(scoreRow);
})();

/* ── Build SWOT grid ── */
(function buildSwot() {
  const grid = document.getElementById('swotGrid');

  SWOT_DATA.forEach(function(sw) {
    const card = document.createElement('div');
    card.className = 'swot-card';
    card.style.borderColor = sw.borderColor;

    /* Heading */
    const h3 = document.createElement('h3');
    h3.className = sw.headClass;
    h3.innerHTML = sw.label + ' <span style="font-weight:400;opacity:.65;">(' + sw.sub + ')</span>';
    card.appendChild(h3);

    /* Toggle button */
    const toggle = document.createElement('button');
    toggle.className = 'prompt-toggle';
    toggle.setAttribute('aria-expanded', 'false');
    toggle.innerHTML =
      '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>' +
      'Quick-add prompts' +
      '<svg class="chevron" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>';
    card.appendChild(toggle);

    /* Prompts panel */
    const panel = document.createElement('div');
    panel.className = 'prompt-panel';
    panel.id = 'panel-' + sw.key;

    sw.prompts.forEach(function(promptText, idx) {
      const item = document.createElement('div');
      item.className = 'prompt-item';
      item.id = 'item-' + sw.key + '-' + idx;

      const chk = document.createElement('input');
      chk.type = 'checkbox';
      chk.id = 'chk-' + sw.key + '-' + idx;

      const lbl = document.createElement('label');
      lbl.setAttribute('for', 'chk-' + sw.key + '-' + idx);
      lbl.textContent = promptText;

      item.appendChild(chk);
      item.appendChild(lbl);
      panel.appendChild(item);
    });

    card.appendChild(panel);

    /* Textarea */
    const ta = document.createElement('textarea');
    ta.className = 'swot-ta';
    ta.id = 'ta-' + sw.key;
    ta.rows = 3;
    ta.placeholder = sw.placeholder;
    card.appendChild(ta);

    grid.appendChild(card);

    /* Toggle interaction */
    toggle.addEventListener('click', function() {
      const isOpen = panel.classList.toggle('open');
      toggle.classList.toggle('open', isOpen);
      toggle.setAttribute('aria-expanded', isOpen);
    });

    /* Checkbox interactions */
    panel.querySelectorAll('input[type="checkbox"]').forEach(function(chk, idx) {
      chk.addEventListener('change', function() {
        const item = chk.closest('.prompt-item');
        const promptText = item.querySelector('label').textContent;

        if (chk.checked) {
          item.classList.add('checked');
          const current = ta.value.trim();
          ta.value = current ? current + '\n• ' + promptText : '• ' + promptText;
        } else {
          item.classList.remove('checked');
          const lines = ta.value.split('\n').filter(function(line) {
            return !line.includes(promptText.substring(0, 25));
          });
          ta.value = lines.join('\n');
        }
      });
    });
  });
})();

/* ── Download as PDF ── */
function downloadPDF() {
  // Hide action buttons so they don't appear in the PDF
  var actionRow = document.querySelector('.action-row');
  var promptToggles = document.querySelectorAll('.prompt-toggle');
  var promptPanels = document.querySelectorAll('.prompt-panel');

  actionRow.style.display = 'none';
  promptToggles.forEach(function(el) { el.style.display = 'none'; });
  promptPanels.forEach(function(el) { el.style.display = 'none'; });

  window.print();

  // Restore after print dialog closes
  setTimeout(function() {
    actionRow.style.display = '';
    promptToggles.forEach(function(el) { el.style.display = ''; });
  }, 1000);
}

/* ── Reset all fields ── */
function clearAll() {
  if (!confirm('Reset all fields? This cannot be undone.')) return;

  document.querySelectorAll('input[type="text"]').forEach(function(el) {
    if (el.id !== 'date') el.value = '';
  });

  document.querySelectorAll('textarea').forEach(function(el) {
    el.value = '';
  });

  document.querySelectorAll('.star').forEach(function(el) {
    el.classList.remove('on');
  });

  document.querySelectorAll('.score-fill').forEach(function(el) {
    el.style.width = '0%';
  });

  document.querySelectorAll('input[type="checkbox"]').forEach(function(el) {
    el.checked = false;
    el.closest('.prompt-item').classList.remove('checked');
  });

  const insight = document.querySelector('.insight-text');
  if (insight) {
    insight.textContent = 'Write your main conclusion — where to position your company, who to target, and what to do next.';
  }
}

</script>
