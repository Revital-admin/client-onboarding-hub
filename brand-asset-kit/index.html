<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Asset & Typography Kit</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../vars.css">
  <link rel="stylesheet" href="../shared-components.css">
  <link rel="stylesheet" href="../forms.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="module-body">
  <div class="module-container">
    <div class="module-header">
      <div class="module-header-left">
        <div class="site-header">
          <div class="header-eyebrow"><span class="dot"></span><span>Brand Reference</span></div>
          <h1 class="site-title">Brand Asset <em>Kit</em></h1>
          <p class="site-subtitle">Quick reference for client hex colors, typography, and logos.</p>
        </div>
      </div>
      <div class="module-header-right">
        <select id="clientSelect" class="form-control" style="width: 250px;"></select>
      </div>
    </div>

    <div class="card empty-state" id="emptyState" style="margin-top: 24px;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
      <h3>Select a client</h3>
      <p>Choose a client above to manage their brand kit.</p>
    </div>

    <div id="brandKitInterface" style="display: none; margin-top: 24px;">
      <div class="brand-kit-grid">
        <!-- COLORS -->
        <div class="card">
          <h3>Brand Colors</h3>
          <div class="form-group mt-3">
            <label>Primary Hex Color</label>
            <div style="display:flex; gap:8px">
              <input type="color" id="primaryColorPick" class="color-picker">
              <input type="text" id="primaryColorText" class="form-control" placeholder="#000000">
            </div>
          </div>
          <div class="form-group mt-3">
            <label>Secondary Hex Color</label>
            <div style="display:flex; gap:8px">
              <input type="color" id="secondaryColorPick" class="color-picker">
              <input type="text" id="secondaryColorText" class="form-control" placeholder="#FFFFFF">
            </div>
          </div>
          <div class="form-group mt-3">
            <label>Accent Hex Color</label>
            <div style="display:flex; gap:8px">
              <input type="color" id="accentColorPick" class="color-picker">
              <input type="text" id="accentColorText" class="form-control" placeholder="#FF0000">
            </div>
          </div>
        </div>

        <!-- TYPOGRAPHY -->
        <div class="card">
          <h3>Typography</h3>
          <div class="form-group mt-3">
            <label>Primary Font (Headings)</label>
            <input type="text" id="fontPrimary" class="form-control" placeholder="e.g. Inter">
          </div>
          <div class="form-group mt-3">
            <label>Secondary Font (Body)</label>
            <input type="text" id="fontSecondary" class="form-control" placeholder="e.g. Roboto">
          </div>
          <div class="form-group mt-3">
            <label>Tone of Voice</label>
            <textarea id="toneOfVoice" class="form-control" rows="3" placeholder="e.g. Professional but approachable..."></textarea>
          </div>
        </div>
      </div>

      <!-- ASSETS -->
      <div class="card mt-4">
        <h3>Logo & Drive Links</h3>
        <div class="form-row mt-3">
          <div class="form-group" style="flex:1">
            <label>Logo / Brand Folder URL (Google Drive/Dropbox)</label>
            <input type="url" id="logoUrl" class="form-control" placeholder="https://drive.google.com/...">
          </div>
        </div>
        <div class="form-actions mt-3">
          <button class="btn-primary" id="saveBrandKitBtn">Save Brand Kit</button>
        </div>
      </div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
