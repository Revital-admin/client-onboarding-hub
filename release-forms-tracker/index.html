<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Release Forms Tracker</title>
<link rel="stylesheet" href="../style.css?v=1">
<link rel="stylesheet" href="css/style.css?v=1">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
<div class="bg-grid"></div>

<main class="container container-wide">
<div class="brand-bar">
<div class="brand-logo-container"></div>
</div>

<header class="site-header">
<div class="header-eyebrow">
<span class="dot"></span>
<span>Production</span>
</div>
<h1 class="site-title">Release Forms <em>Tracker</em></h1>
<p class="site-subtitle">Every signed talent and location release in one place, so nothing gets used publicly without documentation on file.</p>
</header>

<div class="summary-bar" id="summaryBar">
<div class="summary-stat"><span class="summary-num" id="summaryPending">0</span><span class="summary-label">Pending</span></div>
<div class="summary-stat"><span class="summary-num" id="summarySigned">0</span><span class="summary-label">Signed</span></div>
</div>

<div class="step-card">
<div class="section-title" style="margin-bottom: 20px; border-bottom: 1px solid var(--color-border); padding-bottom: 8px;">
<h2 style="font-family: var(--font-heading); color: var(--color-accent);">Log a Release</h2>
</div>

<div class="form-grid">
<div class="form-group"><label for="clientName">Client Name</label><input type="text" id="clientName" list="clientOptions" placeholder="Client / company name..."><datalist id="clientOptions"></datalist></div>
<div class="form-group"><label for="projectTitle">Project / Shoot Title</label><input type="text" id="projectTitle"></div>
<div class="form-group"><label for="signeeName">Signee Name</label><input type="text" id="signeeName" placeholder="Talent, interviewee, or location owner"></div>
<div class="form-group"><label for="signeeType">Signee Type</label><select id="signeeType"><option>Talent / Model</option><option>Location Owner</option><option>Interviewee</option><option>Other</option></select></div>
<div class="form-group"><label for="releaseType">Release Type</label><select id="releaseType"><option>Model Release</option><option>Location Release</option><option>Minor Release</option><option>Other</option></select></div>
<div class="form-group"><label for="status">Status</label><select id="status"><option>Pending</option><option>Signed</option><option>Declined</option></select></div>
<div class="form-group"><label for="dateSigned">Date Signed</label><input type="date" id="dateSigned"></div>
<div class="form-group"><label for="formLocation">Form Storage Location</label><input type="text" id="formLocation" placeholder="e.g. Signed Forms folder in Drive, PandaDoc link..."></div>
</div>
<div class="form-group"><label for="notes">Notes</label><input type="text" id="notes" placeholder="Anything else worth flagging..."></div>

<button id="saveEntryBtn" class="btn-primary">Log Release</button>
</div>

<div class="step-card">
<div class="tracker-controls-row" style="flex-wrap: wrap; gap: 14px;">
<input type="text" id="filterClientInput" placeholder="Filter by client name..." style="flex:1; min-width:220px;">
</div>
</div>

<div class="step-card table-card">
<div class="tracker-table-wrap">
<table class="tracker-table">
<thead>
<tr>
<th>Client</th>
<th>Project</th>
<th>Signee</th>
<th>Type</th>
<th>Date Signed</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="logTableBody"></tbody>
</table>
<p id="emptyState" class="empty-state" style="display:none;">No releases logged yet.</p>
</div>
</div>

</main>
<script src="js/app.js?v=2"></script>
</body>
</html>
