<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discovery Call Script</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="bg-grid"></div>

  <main class="container">
    <div class="brand-bar">
      <div class="brand-logo-container"></div>
    </div>

    <header class="site-header">
      <div class="header-eyebrow">
        <span class="dot"></span>
        <span>Sales & Pitch</span>
      </div>
      <h1 class="site-title">Discovery Call <em>Script</em></h1>
      <p class="site-subtitle">A live coach for the call, not a static document. Work through each block in order and type what the prospect actually says.</p>
    </header>

    <div class="step-card call-header-card">
      <div class="call-header-grid">
        <div class="form-group">
          <label for="clientNameField">Client Name</label>
          <input type="text" id="clientNameField" placeholder="e.g. Jane Smith">
        </div>
        <div class="form-group">
          <label for="companyField">Company</label>
          <input type="text" id="companyField" placeholder="e.g. Acme Corp">
        </div>
        <div class="form-group">
          <label for="callDateField">Call Date</label>
          <input type="date" id="callDateField">
        </div>
      </div>
    </div>

    <div id="blocksContainer" class="main-content"></div>

    <div class="step-card postcall-card">
      <h2 style="font-family: var(--font-heading); margin-bottom: 20px;">Post-Call Summary</h2>

      <div class="form-group">
        <label>Overall Fit</label>
        <div class="fit-pill-group" id="overallFitGroup">
          <button type="button" class="fit-pill" data-value="not_a_fit">🔴 Not a Fit</button>
          <button type="button" class="fit-pill" data-value="possible">🟡 Possible</button>
          <button type="button" class="fit-pill" data-value="strong_fit">🟢 Strong Fit</button>
        </div>
      </div>

      <div class="postcall-grid">
        <div class="form-group">
          <label for="budgetConfirmed">Budget Confirmed</label>
          <select id="budgetConfirmed">
            <option value="">Select...</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
            <option value="approximate">Approximate</option>
          </select>
        </div>
        <div class="form-group">
          <label for="budgetAmount">Budget Amount ($)</label>
          <input type="text" id="budgetAmount" placeholder="e.g. 2,500/mo">
        </div>
        <div class="form-group">
          <label for="decisionMakerSummary">Decision Maker</label>
          <select id="decisionMakerSummary">
            <option value="">Select...</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
            <option value="shared">Shared</option>
          </select>
        </div>
        <div class="form-group">
          <label for="timelineSummary">Timeline</label>
          <select id="timelineSummary">
            <option value="">Select...</option>
            <option value="immediate">Immediate</option>
            <option value="1to3">1 - 3 months</option>
            <option value="exploring">Just exploring</option>
            <option value="unknown">Unknown</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="redFlagsSummary">Red Flags</label>
        <textarea id="redFlagsSummary" rows="3" placeholder="Anything concerning worth flagging before the proposal goes out..."></textarea>
      </div>

      <div class="postcall-grid">
        <div class="form-group">
          <label for="recommendedPackage">Recommended Package</label>
          <select id="recommendedPackage">
            <option value="">Select...</option>
            <option value="basic_social">Basic Social</option>
            <option value="growth_ads">Growth Ads</option>
            <option value="full_stack">Full-Stack</option>
            <option value="custom">Custom</option>
          </select>
        </div>
        <div class="form-group">
          <label for="estimatedRetainer">Estimated Monthly Retainer ($)</label>
          <input type="number" id="estimatedRetainer" min="0" step="100" placeholder="e.g. 2500">
        </div>
      </div>

      <div class="form-group">
        <label>Recommended Services</label>
        <div class="checkbox-grid" id="recommendedServicesGroup">
          <label class="checkbox-pill"><div class="custom-checkbox"><input type="checkbox" value="organic_social"><svg class="check-icon" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>Organic Social</label>
          <label class="checkbox-pill"><div class="custom-checkbox"><input type="checkbox" value="paid_social"><svg class="check-icon" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>Paid Social</label>
          <label class="checkbox-pill"><div class="custom-checkbox"><input type="checkbox" value="paid_search"><svg class="check-icon" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>Paid Search</label>
          <label class="checkbox-pill"><div class="custom-checkbox"><input type="checkbox" value="seo"><svg class="check-icon" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>SEO</label>
          <label class="checkbox-pill"><div class="custom-checkbox"><input type="checkbox" value="email_marketing"><svg class="check-icon" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>Email Marketing</label>
          <label class="checkbox-pill"><div class="custom-checkbox"><input type="checkbox" value="website_design"><svg class="check-icon" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>Website Design</label>
          <label class="checkbox-pill"><div class="custom-checkbox"><input type="checkbox" value="inbound_marketing"><svg class="check-icon" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>Inbound Marketing</label>
          <label class="checkbox-pill"><div class="custom-checkbox"><input type="checkbox" value="strategy"><svg class="check-icon" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>Strategy</label>
        </div>
      </div>

      <div class="postcall-grid">
        <div class="form-group">
          <label for="nextAction">Next Action</label>
          <select id="nextAction">
            <option value="">Select...</option>
            <option value="send_proposal">Send Proposal</option>
            <option value="follow_up">Follow Up</option>
            <option value="not_pursuing">Not Pursuing</option>
          </select>
        </div>
        <div class="form-group">
          <label for="nextActionDate">Next Action Date</label>
          <input type="date" id="nextActionDate">
        </div>
      </div>

      <div class="form-group">
        <label for="postCallNotes">Notes</label>
        <textarea id="postCallNotes" rows="4" placeholder="Anything else worth capturing..."></textarea>
      </div>

      <button id="openProposalBtn" class="download-pdf-btn" style="width: 100%; justify-content: center; margin-top: 12px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect></svg>
        <span>Open Proposal Calculator</span>
      </button>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
