<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monthly Report Archive</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../vars.css">
  <link rel="stylesheet" href="../shared-components.css">
  <link rel="stylesheet" href="../forms.css?v=2">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="module-body">
  <div class="module-container">
    <div class="module-header">
      <div class="module-header-left">
        <div class="site-header">
          <div class="header-eyebrow"><span class="dot"></span><span>Client Portal Sync</span></div>
          <h1 class="site-title">Report <em>Archive</em></h1>
          <p class="site-subtitle">Drop Looker Studio or PDF links here. They sync directly to the Client Portal.</p>
        </div>
      </div>
    </div>

    <div class="split-layout">
      <!-- LEFT: Client Selection -->
      <div class="left-panel">
        <div class="card">
          <div class="form-group">
            <label>Select Client</label>
            <select id="clientSelect" class="form-control"></select>
          </div>
        </div>
      </div>

      <!-- RIGHT: Reports -->
      <div class="right-panel">
        <div class="card empty-state" id="emptyState">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
          <h3>Select a client</h3>
          <p>Choose a client to manage their report archive.</p>
        </div>

        <div id="reportsInterface" style="display: none;">
          <div class="card create-card">
            <h3>Add New Report</h3>
            <div class="form-row">
              <div class="form-group" style="flex:1">
                <label>Month / Year</label>
                <input type="text" id="newMonth" class="form-control" placeholder="e.g. October 2024">
              </div>
              <div class="form-group" style="flex:2">
                <label>Report URL (Looker Studio, Drive, etc)</label>
                <input type="url" id="newUrl" class="form-control" placeholder="https://...">
              </div>
            </div>
            <div class="form-group">
              <label>Executive Summary / Notes</label>
              <textarea id="newNotes" class="form-control" rows="2" placeholder="Brief notes for the client..."></textarea>
            </div>
            <div class="form-actions mt-3">
              <button class="btn-primary" id="saveReportBtn">Publish to Portal</button>
            </div>
          </div>

          <div class="history-section mt-4">
            <h3>Client's Portal Archive</h3>
            <div id="reportsList" class="reports-timeline"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
