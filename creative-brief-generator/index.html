<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Brief Generator</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <!-- Use marked to compile the preview visually -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="bg-grid"></div>

  <main class="container">
    <div class="brand-bar">
      <div class="brand-logo-container"></div>
      <button class="download-pdf-btn" id="copyBtn" aria-label="Copy Markdown">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        <span>Copy for ClickUp</span>
      </button>
    </div>

    <header class="site-header">
      <div class="header-eyebrow">
        <span class="dot"></span>
        <span>Campaign setup</span>
      </div>
      <h1 class="site-title">Creative<br /><em>Brief Generator</em></h1>
      <p class="site-subtitle">Fill out the fields below to instantly generate a beautifully formatted Markdown brief that you can paste directly into a ClickUp task.</p>
    </header>

    <div class="main-content split-layout">
      <div class="step-card">
        
        <div class="form-group">
          <label for="campaignName">Campaign Name</label>
          <input type="text" id="campaignName" placeholder="e.g. Summer Sale 2026">
        </div>
        
        <div class="form-group">
          <label for="clientName">Client / Brand</label>
          <input type="text" id="clientName" placeholder="e.g. Acme Corp">
        </div>

        <div class="form-group">
          <label for="objective">Primary Objective</label>
          <select id="objective">
            <option value="Brand Awareness">Brand Awareness</option>
            <option value="Lead Generation">Lead Generation</option>
            <option value="Direct Sales / Conversion">Direct Sales / Conversion</option>
            <option value="Audience Engagement">Audience Engagement</option>
            <option value="Education / Information">Education / Information</option>
          </select>
        </div>

        <div class="form-group">
          <label for="targetAudience">Target Audience</label>
          <textarea id="targetAudience" rows="2" placeholder="e.g. Homeowners aged 35-55 looking for premium landscaping."></textarea>
        </div>

        <div class="form-group">
          <label for="keyMessage">Key Message / Value Prop</label>
          <textarea id="keyMessage" rows="2" placeholder="e.g. Get your lawn summer-ready in 24 hours without lifting a finger."></textarea>
        </div>

        <div class="form-group">
          <label for="toneOfVoice">Tone of Voice</label>
          <select id="toneOfVoice">
            <option value="Professional & Authoritative">Professional & Authoritative</option>
            <option value="Casual & Relatable">Casual & Relatable</option>
            <option value="Urgent & Action-Oriented">Urgent & Action-Oriented</option>
            <option value="Educational & Helpful">Educational & Helpful</option>
            <option value="Humorous & Playful">Humorous & Playful</option>
          </select>
        </div>

        <div class="form-group">
          <label for="deliverables">Required Deliverables</label>
          <textarea id="deliverables" rows="3" placeholder="e.g. - 3x 15s TikTok videos&#10;- 2x Static FB Ads&#10;- 1x Email Broadcast"></textarea>
        </div>

        <div class="form-group">
          <label for="references">Inspiration / References (Links)</label>
          <textarea id="references" rows="2" placeholder="e.g. Paste links to mood boards, competitor examples, or assets here."></textarea>
        </div>

      </div>
      
      <div class="step-card" style="position: sticky; top: 24px;">
        <h2 style="font-family: var(--font-heading); margin-bottom: 16px;">Live Preview</h2>
        <div id="previewContainer" class="preview-panel markdown-preview" style="font-family: var(--font-body); font-size: 14px; line-height: 1.6; color: var(--color-text-primary);">
          <!-- Markdown renders here -->
        </div>
      </div>
    </div>
  </main>
  
  <script src="js/logo.js"></script>
  <script src="js/app.js?v=62"></script>
</body>
</html>
