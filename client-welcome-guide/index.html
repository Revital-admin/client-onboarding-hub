<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Welcome Guide Generator</title>
  <link rel="stylesheet" href="../style.css?v=2">
  <link rel="stylesheet" href="css/style.css?v=5">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
  <div class="bg-grid"></div>

  <main class="container">
    <div class="brand-bar">
      <div class="brand-logo-container"></div>
      <button class="download-pdf-btn" id="generatePdfBtn" aria-label="Download PDF">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        <span>Download PDF</span>
      </button>
    </div>

    <header class="site-header">
      <div class="header-eyebrow">
        <span class="dot"></span>
        <span>Client Onboarding</span>
      </div>
      <h1 class="site-title">Welcome Guide<br /><em>Generator</em></h1>
      <p class="site-subtitle">Generate a universal welcome PDF for a new client.</p>
    </header>

    <div class="main-content split-layout-wide-right">
      <div class="step-card">
        
        <div class="form-group">
          <label for="clientName">Client Name</label>
          <input type="text" id="clientName" placeholder="e.g. Acme Corp">
        </div>
        
        <div class="form-group">
          <label for="portalLink">Client Portal Link</label>
          <input type="text" id="portalLink" readonly placeholder="Automatically pulled from the active client in the Hub" style="background: rgba(255,255,255,0.02); color: var(--color-text-secondary);">
        </div>

        <div class="form-group">
          <label for="loomLink">Portal Walkthrough Video Link (Loom)</label>
          <input type="text" id="loomLink" placeholder="https://www.loom.com/share/...">
        </div>

        <div class="form-group">
          <label for="amName">Account Manager Name</label>
          <input type="text" id="amName" placeholder="e.g. Jane Doe">
        </div>

        <div class="form-group">
          <label for="amEmail">Account Manager Email</label>
          <input type="email" id="amEmail" placeholder="e.g. jane@revitalproductions.com">
        </div>

        <div class="form-group">
          <label for="welcomeNote">Custom Welcome Note (1-2 sentences)</label>
          <textarea id="welcomeNote" rows="3" placeholder="e.g. We are so excited to help Acme Corp hit your $10k MRR goal!"></textarea>
        </div>

        <div class="form-group">
          <label>Included Services</label>
          <div class="form-group checkbox-grid">
          <label class="checkbox-item">
            <div class="custom-checkbox">
              <input type="checkbox" id="srvAds" value="Paid Advertising" checked>
              <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <span>Paid Advertising</span>
          </label>
          <label class="checkbox-item">
            <div class="custom-checkbox">
              <input type="checkbox" id="srvSeo" value="SEO Optimization">
              <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <span>SEO Optimization</span>
          </label>
          <label class="checkbox-item">
            <div class="custom-checkbox">
              <input type="checkbox" id="srvWeb" value="Website Development">
              <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <span>Website Development</span>
          </label>
          <label class="checkbox-item">
            <div class="custom-checkbox">
              <input type="checkbox" id="srvSocial" value="Social Media Management">
              <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <span>Social Media Management</span>
          </label>
          <label class="checkbox-item">
            <div class="custom-checkbox">
              <input type="checkbox" id="srvContent" value="Content Creation">
              <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <span>Content Creation</span>
          </label>
        </div>
        </div>
        
        <div class="alert-box">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          <div>The 30-Day Roadmap, Communication Policies, and Approval Guidelines are automatically baked into the PDF.</div>
        </div>
      </div>

      <div class="step-card" style="position: sticky; top: 24px;">
        <h2 style="font-family: var(--font-heading); margin-bottom: 16px;">Live Preview</h2>
        <div class="preview-scroll" style="max-height: 80vh; overflow-y: auto;">
          <div class="document-preview" id="pdfContainer">
          <!-- Populated by JS -->
          </div>
        </div>
      </div>
    </div>
  </main>
  
  <script src="js/logo.js"></script>
  <script src="js/app.js?v=73"></script>
</body>
</html>
