<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Template Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=1" />
</head>
<body>
  <div class="split-layout">
    <!-- Left Sidebar: Template Index -->
    <aside class="wiki-sidebar">
      <div class="sidebar-header">
        <div class="sidebar-header-top">
          <h1 class="wiki-title">Email Templates</h1>
          <button id="newSopBtn" class="btn-new-sop" title="New Template" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            New Template
          </button>
        </div>
        <div class="search-container">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" id="searchInput" class="search-input" placeholder="Search templates..." autocomplete="off">
        </div>
      </div>
      <div class="sop-list" id="sopList">
        <!-- Rendered via JS -->
      </div>
    </aside>

    <!-- Right Pane: Template Viewer -->
    <main class="wiki-content">
      <div id="welcomeState" class="empty-state">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2" ry="2"></rect><polyline points="3 7 12 13 21 7"></polyline></svg>
        </div>
        <h2>Select a template</h2>
        <p>Choose an email template from the sidebar or search to begin reading.</p>
      </div>

      <div id="viewerState" class="viewer-state" style="display: none;">
        <header class="doc-header">
          <div class="doc-header-top">
            <div class="doc-category-row">
              <span class="doc-category" id="docCategory">Category</span>
              <span class="template-number-badge" id="docNumber" style="display:none;"></span>
            </div>
            <div class="doc-actions">
              <button id="copyTemplateBtn" class="btn-copy-template" type="button">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                Copy Template
              </button>
              <button id="editSopBtn" class="btn-doc-action" type="button">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"></path></svg>
                Edit
              </button>
              <button id="deleteSopBtn" class="btn-doc-action btn-doc-action-danger" type="button">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                Delete
              </button>
            </div>
          </div>
          <h1 class="doc-title" id="docTitle">Template Title</h1>
          <div class="doc-meta">
            <span id="docDate">Last updated: Today</span>
          </div>
        </header>
        <div class="subject-line-box">
          <div class="subject-line-label">Subject Line</div>
          <div class="subject-line-value" id="docSubject">—</div>
        </div>
        <div class="doc-body" id="docBody">
          <!-- Rendered Markdown/HTML -->
        </div>
      </div>
    </main>
  </div>

  <!-- Template Editor Modal -->
  <div id="editorOverlay" class="editor-overlay" style="display:none;">
    <div class="editor-modal">
      <div class="editor-modal-header">
        <h2 id="editorModalTitle">New Template</h2>
        <button id="closeEditorBtn" class="editor-close-btn" type="button" title="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="editor-modal-body">
        <div class="editor-input-row">
          <div>
            <label class="editor-label" for="editorCategory">Category</label>
            <select id="editorCategory" class="editor-input"></select>
          </div>
          <div>
            <label class="editor-label" for="editorNumber">Template # (optional)</label>
            <input type="text" id="editorNumber" class="editor-input" placeholder="e.g. #17 or #17C" autocomplete="off">
          </div>
        </div>
        <input type="text" id="editorNewCategory" class="editor-input" placeholder="New category name" autocomplete="off" style="display:none; margin-top:8px;">

        <label class="editor-label" for="editorTitle">Internal Name</label>
        <input type="text" id="editorTitle" class="editor-input" placeholder="e.g. Kick-Off Call Confirmation" autocomplete="off">

        <label class="editor-label" for="editorSubject">Subject Line</label>
        <input type="text" id="editorSubject" class="editor-input" placeholder="e.g. Let's confirm your kick-off call" autocomplete="off">

        <label class="editor-label" for="editorContent">Body</label>
        <div id="editorToolbar" class="editor-toolbar">
          <button type="button" data-cmd="bold" title="Bold"><strong>B</strong></button>
          <button type="button" data-cmd="italic" title="Italic"><em>I</em></button>
          <span class="editor-toolbar-divider"></span>
          <button type="button" data-block="H2" title="Heading">H2</button>
          <button type="button" data-block="H3" title="Subheading">H3</button>
          <button type="button" data-block="P" title="Paragraph">¶</button>
          <span class="editor-toolbar-divider"></span>
          <button type="button" data-cmd="insertUnorderedList" title="Bullet list">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
          </button>
          <button type="button" data-cmd="insertOrderedList" title="Numbered list">1.</button>
          <button type="button" data-block="BLOCKQUOTE" title="Quote">&rdquo;</button>
          <span class="editor-toolbar-divider"></span>
          <button type="button" data-cmd="createLink" title="Link">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
          </button>
          <button type="button" data-cmd="removeFormat" title="Clear formatting">Clear</button>
        </div>
        <div id="editorContent" class="editor-richtext" contenteditable="true" data-placeholder="Write the template body. Use {{clientName}} style placeholders for anything that changes per client."></div>
      </div>
      <div class="editor-modal-footer">
        <button id="cancelEditorBtn" class="btn-editor-secondary" type="button">Cancel</button>
        <button id="saveSopBtn" class="btn-editor-primary" type="button">Save Template</button>
      </div>
    </div>
  </div>

  <script src="js/data.js?v=3"></script>
  <script src="js/app.js?v=1"></script>
</body>
</html>
